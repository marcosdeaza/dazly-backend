<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazly - System Stats Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin: 5px;
        }
        
        .status-active {
            background: #10b981;
            color: white;
        }
        
        .status-cooldown {
            background: #ef4444;
            color: white;
        }
        
        .status-optimized {
            background: #3b82f6;
            color: white;
        }
        
        .status-not-optimized {
            background: #fbbf24;
            color: #78350f;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-box p {
            opacity: 0.9;
        }
        
        .region-item {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .region-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .region-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #374151;
        }
        
        .region-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #6b7280;
        }
        
        .progress-bar {
            background: #e5e7eb;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .refresh-btn:active {
            transform: scale(0.95);
        }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 0.9em;
        }
        
        .auto-refresh input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .header-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Dazly System Dashboard</h1>
            <p>Monitoreo en tiempo real del sistema optimizado</p>
            <div class="header-controls">
                <button class="refresh-btn" onclick="loadStats()">🔄 Actualizar</button>
                <div class="auto-refresh">
                    <input type="checkbox" id="autoRefresh" checked>
                    <label for="autoRefresh">Auto-refresh (5s)</label>
                </div>
            </div>
        </div>
        
        <div id="content">
            <div class="loading">⏳ Cargando estadísticas...</div>
        </div>
    </div>
    
    <script>
        let autoRefreshInterval = null;
        
        async function loadStats() {
            try {
                const response = await fetch('/api/system/stats');
                const data = await response.json();
                
                if (!data.success) {
                    showError('Error cargando estadísticas: ' + data.error);
                    return;
                }
                
                renderStats(data);
            } catch (error) {
                showError('Error conectando con el servidor: ' + error.message);
            }
        }
        
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error-message">
                    ❌ ${message}
                </div>
            `;
        }
        
        function renderStats(data) {
            const content = document.getElementById('content');
            
            if (!data.optimized) {
                content.innerHTML = `
                    <div class="card">
                        <h2>⚠️ Sistema No Optimizado</h2>
                        <p>${data.message}</p>
                        <p style="margin-top: 15px; color: #6b7280;">
                            El sistema actual no tiene las optimizaciones de multi-región, caché y cola.
                            Ejecuta <code style="background: #f3f4f6; padding: 5px 10px; border-radius: 5px;">SWITCH_TO_OPTIMIZED.bat</code> para activar.
                        </p>
                        <span class="status-badge status-not-optimized">No Optimizado</span>
                    </div>
                `;
                return;
            }
            
            const stats = data.stats;
            
            // Calcular totales
            const totalRequests = Object.values(stats.regions).reduce((sum, r) => sum + r.requests, 0);
            const totalErrors = Object.values(stats.regions).reduce((sum, r) => sum + r.errors, 0);
            const successRate = totalRequests > 0 ? ((totalRequests - totalErrors) / totalRequests * 100).toFixed(1) : 100;
            
            // Renderizar
            content.innerHTML = `
                <div class="card">
                    <h2>✅ Sistema Optimizado Activo</h2>
                    <span class="status-badge status-optimized">Optimizado</span>
                    <span class="status-badge" style="background: #10b981; color: white;">
                        Tasa de éxito: ${successRate}%
                    </span>
                </div>
                
                <div class="grid">
                    <div class="stat-box">
                        <h3>${stats.queue.pending}</h3>
                        <p>Peticiones en Cola</p>
                    </div>
                    <div class="stat-box">
                        <h3>${stats.queue.active}/${stats.queue.max}</h3>
                        <p>Peticiones Activas</p>
                    </div>
                    <div class="stat-box">
                        <h3>${stats.rateLimiter.tokens}/${stats.rateLimiter.maxTokens}</h3>
                        <p>Tokens Disponibles</p>
                    </div>
                    <div class="stat-box">
                        <h3>${stats.cache.size}/${stats.cache.maxSize}</h3>
                        <p>Entradas en Caché</p>
                    </div>
                </div>
                
                <div class="card">
                    <h2>🌍 Estado de Regiones</h2>
                    ${renderRegions(stats.regions)}
                </div>
                
                <div class="card">
                    <h2>📊 Estadísticas Globales</h2>
                    <div class="region-stats" style="justify-content: center; font-size: 1.1em;">
                        <div>📈 Total peticiones: <strong>${totalRequests}</strong></div>
                        <div>❌ Total errores: <strong>${totalErrors}</strong></div>
                        <div>✅ Tasa de éxito: <strong>${successRate}%</strong></div>
                    </div>
                </div>
            `;
        }
        
        function renderRegions(regions) {
            const now = Date.now();
            let html = '';
            
            for (const [name, data] of Object.entries(regions)) {
                const isActive = data.cooldownUntil < now;
                const statusBadge = isActive 
                    ? '<span class="status-badge status-active">🟢 ACTIVA</span>'
                    : '<span class="status-badge status-cooldown">🔴 COOLDOWN</span>';
                
                const errorRate = data.requests > 0 
                    ? ((data.errors / data.requests) * 100).toFixed(1)
                    : 0;
                
                const successRate = data.requests > 0
                    ? (100 - errorRate).toFixed(1)
                    : 100;
                
                html += `
                    <div class="region-item">
                        <div class="region-header">
                            <span class="region-name">${name}</span>
                            ${statusBadge}
                        </div>
                        <div class="region-stats">
                            <div>📊 Peticiones: <strong>${data.requests}</strong></div>
                            <div>❌ Errores: <strong>${data.errors}</strong></div>
                            <div>✅ Éxito: <strong>${successRate}%</strong></div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${successRate}%">
                                ${successRate}%
                            </div>
                        </div>
                    </div>
                `;
            }
            
            return html;
        }
        
        function setupAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            
            checkbox.addEventListener('change', () => {
                if (checkbox.checked) {
                    startAutoRefresh();
                } else {
                    stopAutoRefresh();
                }
            });
            
            if (checkbox.checked) {
                startAutoRefresh();
            }
        }
        
        function startAutoRefresh() {
            if (autoRefreshInterval) return;
            autoRefreshInterval = setInterval(loadStats, 5000);
        }
        
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }
        
        // Cargar al inicio
        loadStats();
        setupAutoRefresh();
    </script>
</body>
</html>
