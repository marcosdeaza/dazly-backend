# Configuración de Nginx para Dazly API
# Copiar a: /etc/nginx/sites-available/dazly-api
# Luego ejecutar: sudo ln -s /etc/nginx/sites-available/dazly-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.tudominio.com;  # CAMBIAR POR TU DOMINIO

    # Logs
    access_log /var/log/nginx/dazly-api-access.log;
    error_log /var/log/nginx/dazly-api-error.log;

    # Tamaño máximo de body (para uploads de imágenes)
    client_max_body_size 50M;

    # Proxy a Node.js
    location / {
        proxy_pass http://localhost:8081;  # Puerto de tu API
        proxy_http_version 1.1;
        
        # WebSocket support (si lo necesitas en el futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers necesarios
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts (importantes para generación de imágenes)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:8081/health;
        access_log off;
    }
}

# Después de configurar SSL con certbot, se generará automáticamente
# un bloque adicional para HTTPS (puerto 443)
